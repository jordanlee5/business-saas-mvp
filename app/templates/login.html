<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 业务数据管理SaaS MVP</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        .login-container {
            max-width: 420px;
            margin: 100px auto;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }
        h1 {
            margin-top: 0;
            font-size: 26px;
            color: #0f172a;
            text-align: center;
        }
        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
            text-align: center;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            margin-bottom: 18px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 14px;
        }
        .tip {
            margin-top: 16px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
        }
        a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h1>系统登录</h1>
        <div class="subtitle">业务数据管理 SaaS MVP</div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <label>用户名</label>
            <input type="text" name="username" placeholder="请输入用户名" required>

            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required>

            <button type="submit">登录</button>
        </form>

        <div class="tip">
            初始管理员账号：admin / admin123<br>
            <a href=" ">返回首页</a >
        </div>
    </div>
</div>
</body>
</html>
