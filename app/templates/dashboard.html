<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>后台首页 - 业务数据管理SaaS MVP</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        .topbar {
            background: #0f172a;
            color: white;
            padding: 18px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar a {
            color: #bfdbfe;
            text-decoration: none;
        }
        .container {
            max-width: 1080px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            margin-bottom: 24px;
        }
        h1 {
            margin-top: 0;
            color: #0f172a;
        }
        .info {
            color: #64748b;
            line-height: 1.8;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 24px;
        }
        .module {
            border: 1px solid #dbeafe;
            background: #eff6ff;
            color: #1d4ed8;
            border-radius: 12px;
            padding: 22px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
        }
        .disabled {
            background: #f8fafc;
            color: #94a3b8;
            border-color: #e2e8f0;
        }
    </style>
</head>
<body>
<div class="topbar">
    <div>业务数据管理 SaaS MVP</div>
    <div>
        当前用户：{{ username }} ｜ 角色：{{ role }} ｜ <a href=" ">退出登录</a >
    </div>
</div>

<div class="container">
    <div class="card">
        <h1>后台首页</h1>
        <div class="info">
            你已经成功登录系统。当前阶段先验证登录闭环，下一步我们会继续增加：
            上传方账号管理、服务费率设置、Excel 上传与业务数据查询。
        </div>

        <div class="grid">
            <a href="/partners" class="module">上传方账号管理</a >
            <div class="module">服务费率设置</div>
            <div class="module">Excel模板上传</div>
            <div class="module">业务数据查询</div>
            <div class="module disabled">OCR凭证识别</div>
            <div class="module disabled">匹配结果审核</div>
        </div>
    </div>
</div>
</body>
</html>
