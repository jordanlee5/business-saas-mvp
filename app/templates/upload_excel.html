{% extends "base.html" %}

{% block title %}上传服务需求{% endblock %}

{% block content %}
    <style>
        .upload-excel-page .ui-hint {
            margin-bottom: 16px;
        }

        .upload-excel-page .upload-form {
            margin-top: 14px;
        }        
        .upload-form {
            display: grid;
            grid-template-columns: 1fr 150px;
            gap: 14px;
            align-items: center;
        }

        .upload-form input[type="file"] {
            width: 100%;
            height: 42px;
            box-sizing: border-box;
            margin: 0;
            padding: 8px 12px;
            border: 1px dashed #94a3b8;
            border-radius: var(--radius-control);
            background: #f8fafc;
        }

        .upload-form .ui-button-primary {
            height: 42px;
            padding: 0 18px;
            border-radius: var(--radius-control);
            font-size: 14px;
        }

        .message {
            margin-bottom: 14px;
            padding: 10px 14px;
            border-radius: var(--radius-control);
            font-size: 14px;
        }

        .success {
            background: #ecfdf5;
            color: #047857;
            border: 1px solid #bbf7d0;
        }

        .error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        ul {
            line-height: 1.5;
        }        
    </style>


<div class="page-container upload-excel-page">
    <div class="ui-card">
        <h1>上传服务需求</h1>

        <div class="ui-hint">
            请上传固定模板 Excel 服务需求清单，需包含：姓名、手机号、车牌号、积分金额、银行卡号。
        </div>

        {% if message %}
            <div class="message success">{{ message }}</div>
        {% endif %}

        {% if errors %}
            <div class="message error">
                <strong>导入错误：</strong>
                <ul>
                    {% for err in errors %}
                        <li>{{ err }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}

        <form method="post" action="/upload-excel" enctype="multipart/form-data" class="upload-form">
            <input type="file" name="file" accept=".xlsx,.xls" required>
            <button type="submit" class="ui-button-primary">上传并提交</button>
        </form>
    </div>
</div>

{% endblock %}
