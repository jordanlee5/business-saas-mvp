<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的结算报表</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: #f3f6fb;
            color: #0f172a;
        }

        .topbar {
            background: #0f172a;
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar a {
            color: #bfdbfe;
            text-decoration: none;
            margin-left: 16px;
        }

        .container {
            max-width: 980px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 30px;
        }

        .notice {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1d4ed8;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 24px;
        }

        .filter-form {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .filter-form input {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
        }

        .filter-form button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .reset-link {
            color: #2563eb;
            text-decoration: none;
            font-weight: 700;
        }

        .export-button {
            display: inline-block;
            margin-bottom: 24px;
            padding: 11px 18px;
            border-radius: 10px;
            background: #16a34a;
            color: white;
            text-decoration: none;
            font-weight: 700;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 20px;
        }

        .settlement-card {
            border: 1px solid #bbf7d0;
            background: #f0fdf4;
        }

        .card-title {
            color: #475569;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div>业务数据管理 SaaS MVP</div>
        <div>
            当前用户：{{ username }} ｜ 角色：{{ role }}
            <a href="/dashboard">返回后台</a >
            <a href="/logout">退出登录</a >
        </div>
    </div>

    <div class="container">
        <h1>我的结算报表</h1>

        <div class="notice">
            本页面仅显示当前上传方自己的结算数据，不包含平台内部上游成本和毛利信息。
        </div>

        <form method="get" action="/my-settlement" class="filter-form">
            <label>开始日期：</label>
            <input type="date" name="start_date" value="{{ start_date }}">

            <label>结束日期：</label>
            <input type="date" name="end_date" value="{{ end_date }}">

            <button type="submit">查看</button>

            <a href="/my-settlement" class="reset-link">重置</a >
        </form>

        <a
            class="export-button"
            href="/my-settlement/export?start_date={{ start_date }}&end_date={{ end_date }}"
        >
            导出结算明细 Excel
        </a >

        <div class="cards">
            <div class="card">
                <div class="card-title">业务数据总条数</div>
                <div class="card-value">{{ total_records }}</div>
            </div>

            <div class="card">
                <div class="card-title">总积分金额</div>
                <div class="card-value">{{ total_points }}</div>
            </div>

            <div class="card settlement-card">
                <div class="card-title">已通过结算条数</div>
                <div class="card-value">{{ approved_settlement_count }}</div>
            </div>

            <div class="card settlement-card">
                <div class="card-title">已通过结算金额</div>
                <div class="card-value">{{ approved_settlement_points }}</div>
            </div>

            <div class="card settlement-card">
                <div class="card-title">结算服务费合计</div>
                <div class="card-value">{{ settlement_service_fee }}</div>
            </div>
        </div>
    </div>
</body>
</html>
